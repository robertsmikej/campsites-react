name: Check Campsite Availability

on:
  # Scheduled polling moved to the campwatch-notifier Cloudflare Worker
  # (reliable 5-min cron). This workflow is kept for manual runs only.
  workflow_dispatch:
    inputs:
      force_email:
        description: 'Send email even if no previous state (skip first-run seeding)'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install notifier dependencies
        working-directory: notifier
        run: npm install

      - name: Check availability and notify
        working-directory: notifier
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBER_API_URL: ${{ secrets.SUBSCRIBER_API_URL }}
          SUBSCRIBER_API_SECRET: ${{ secrets.SUBSCRIBER_API_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          FORCE_EMAIL: ${{ github.event.inputs.force_email }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: npx tsx cli.ts
