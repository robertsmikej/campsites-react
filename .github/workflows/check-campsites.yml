name: Check Campsite Availability

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch:
    inputs:
      force_email:
        description: 'Send email even if no previous state (skip first-run seeding)'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check availability and notify
        working-directory: notifier
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBER_API_URL: ${{ secrets.SUBSCRIBER_API_URL }}
          SUBSCRIBER_API_SECRET: ${{ secrets.SUBSCRIBER_API_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          FORCE_EMAIL: ${{ github.event.inputs.force_email }}
        run: node check.mjs
