name: Deploy Next.js Worker

on:
    push:
        branches: [main]
    workflow_dispatch: {}

# Serialize deploys so two pushes to main can't race the single prod Worker
# (last-writer-wins). cancel-in-progress stays false: never abort a deploy
# that's mid-flight, just queue the next one behind it.
concurrency:
    group: deploy-next
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: next
        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v6
              with:
                  version: 9

            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: next/pnpm-lock.yaml

            - name: Install
              run: pnpm install --frozen-lockfile

            - name: Build for Cloudflare Workers
              run: pnpm run cf:build
              env:
                  # Inlined into the client bundle at build time for Web Push
                  # subscribe. Until this repo secret is set, the value is empty
                  # and the account push toggle stays inert (email-only).
                  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

            - name: Deploy Worker
              uses: cloudflare/wrangler-action@v4
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: next
                  command: deploy
                  secrets: |
                      API_SECRET
                      CONFIG_KEY
                      GOOGLE_CLIENT_ID
                      GOOGLE_CLIENT_SECRET
                      SESSION_SECRET
                      BOOTSTRAP_ADMIN_EMAIL
                      VAPID_PRIVATE_JWK
              env:
                  API_SECRET: ${{ secrets.SUBSCRIBER_API_SECRET }}
                  CONFIG_KEY: ${{ secrets.CONFIG_KEY }}
                  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
                  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
                  BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}
                  VAPID_PRIVATE_JWK: ${{ secrets.VAPID_PRIVATE_JWK }}

    deploy-notifier:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: notifier
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: 22
            - name: Install notifier dependencies
              run: npm install
            - name: Deploy notifier Worker
              uses: cloudflare/wrangler-action@v4
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: notifier
                  command: deploy
                  secrets: |
                      RESEND_API_KEY
                      SUBSCRIBER_API_SECRET
                      VAPID_PRIVATE_JWK
                      HEARTBEAT_URL
              env:
                  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
                  SUBSCRIBER_API_SECRET: ${{ secrets.SUBSCRIBER_API_SECRET }}
                  VAPID_PRIVATE_JWK: ${{ secrets.VAPID_PRIVATE_JWK }}
                  HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}
