name: Deploy Next.js Worker

on:
    push:
        branches: ["**"]
        paths:
            - "next/**"
            - ".github/workflows/deploy-next.yml"
    workflow_dispatch: {}

jobs:
    deploy:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: next
        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v4
              with:
                  version: 9

            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: next/pnpm-lock.yaml

            - name: Install
              run: pnpm install --frozen-lockfile

            - name: Build for Cloudflare Workers
              run: pnpm run cf:build

            - name: Deploy Worker
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: next
                  command: deploy
                  secrets: |
                      API_SECRET
                      CONFIG_KEY
                      GOOGLE_CLIENT_ID
                      GOOGLE_CLIENT_SECRET
                      SESSION_SECRET
                      BOOTSTRAP_ADMIN_EMAIL
              env:
                  API_SECRET: ${{ secrets.SUBSCRIBER_API_SECRET }}
                  CONFIG_KEY: ${{ secrets.CONFIG_KEY }}
                  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
                  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
                  BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}
