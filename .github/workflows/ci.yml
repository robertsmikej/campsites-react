name: CI

on:
    push:
        branches: ["**"]
    pull_request:

jobs:
    ci:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: next
        steps:
            - uses: actions/checkout@v5

            - uses: pnpm/action-setup@v6
              with:
                  version: 9

            - uses: actions/setup-node@v5
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: next/pnpm-lock.yaml

            - name: Install
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Format check
              run: pnpm format:check

            - name: Type-check
              run: pnpm exec tsc --noEmit

            - name: Test
              run: pnpm test

            - name: Cloudflare build
              run: pnpm run cf:build

            # The notifier imports from next/src/*, so its checks need next's
            # deps (installed above) to resolve cross-package external imports
            # like @cloudflare/workers-types. Run them in the same job rather
            # than re-installing next's deps in a separate one.
            - name: Notifier install
              working-directory: notifier
              run: npm install

            - name: Notifier type-check
              working-directory: notifier
              run: npm run typecheck

            - name: Notifier test
              working-directory: notifier
              run: npm test
